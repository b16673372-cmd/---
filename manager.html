<div class="login-pop" id="lp"><div class="login-box"><div class="xg2">G</div><h3>客户需求分析系统</h3><p>干部端 · 专业洞察</p><input type="password" id="pw" placeholder="请输入密码"><div class="err" id="er">密码错误</div><button class="pb" id="lb">验证进入</button></div></div>

<script>

function R(){var N=d.length,ts=new Set(d.map(function(r){return r.t})),ss=new Set(d.map(function(r){return r.s}));var warns=d.filter(function(r){return(r.st||"").indexOf("不想")>=0||(r.st||"").indexOf("无意向")>=0});var retRate=N>0?Math.round((N-warns.length)/Math.max(N,1)*100):0;document.getElementById("heroStats").innerHTML='<div class=hs><div class=hv>'+N+'</div><div class=hl>总记录</div></div><div class=divider></div><div class=hs><div class=hv>'+ts.size+'</div><div class=hl>教师数</div></div><div class=divider></div><div class=hs><div class=hv>'+ss.size+'</div><div class=hl>学生数</div></div><div class=divider></div><div class=hs><div class=hv style=color:#FFE4A0>'+retRate+'%</div><div class=hl>健康度</div></div>'+(warns>0?'<div class=divider></div><div class=hs><div class=hv style=color:#FF8A80>'+warns+'</div><div class=hl>需关注</div></div>':'');var nt=d.filter(function(r){return r.n&&r.n.length>3});document.getElementById("metricsArea").innerHTML='<div class="met m1"><div class=mv>'+retRate+'%</div><div class=ml>健康度 目标>80%</div></div><div class="met m2"><div class=mv>'+ts.size+'</div><div class=ml>活跃教师 目标>5</div></div><div class="met m1"><div class=mv>'+(ts.size>0?Math.round(N/ts.size):'-')+'</div><div class=ml>人均记录 目标>5</div></div>'+(warns>0?'<div class="met m4"><div class=mv>'+warns+'</div><div class=ml>高危学生 需跟进</div></div>':'<div class="met m2"><div class=mv>0</div><div class=ml>高危学生 全部安全</div></div>')+'<div class="met m5"><div class=mv>'+nt.length+'</div><div class=ml>家长反馈</div></div>';var ps={};d.forEach(function(r){(r.p||"").split("/").forEach(function(p){if(p)ps[p]=(ps[p]||0)+1})});var maxC=Math.max.apply(null,Object.values(ps))||1;var so=Object.entries(ps).sort(function(a,b){return b[1]-a[1]}).slice(0,5);document.getElementById("t5").innerHTML=so.length===0?'<li class=empty-state>暂无数据</li>':so.map(function(kv,i){var pct=Math.round(kv[1]/maxC*100);return'<li><div class=rk>'+(i+1)+'</div><span class=lb>'+kv[0]+'</span><div class=bar><div class=fill style=width:'+pct+'%></div></div><span class=cnt>'+kv[1]+'</span></li>'}).join("");var ws=d.filter(function(r){return(r.st||"").indexOf("不想")>=0||(r.st||"").indexOf("无意向")>=0});document.getElementById("ab").innerHTML=ws.length===0?'<span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green)">无高风险学生</span>':ws.slice(0,6).map(function(r){var lv=(r.st||"").indexOf("不想")>=0?"H":"M";return'<div class="alert-item alert-'+(lv==="H"?"h":"m")+'"><span class=risk risk-'+lv.toLowerCase()+'>'+(lv==="H"?"高危":"中危")+'</span>'+(r.s||"?")+" - "+(r.sc||"")+" - "+(r.st||"")+" - 教师:"+(r.t||"")+"</div>"}).join("");var pos=nt.filter(function(r){return(r.n||"").match(/满意|喜欢|好|棒|不错|进步/)}).length;var neg=nt.filter(function(r){return(r.n||"").match(/不满|差|问题|担心|焦虑/)}).length;document.getElementById("pb").innerHTML=nt.length===0?'<span class=empty-state>暂无数据</span>':'<div style=margin-bottom:8px><span class="tag t2">正面 '+pos+'</span><span class="tag t3">负面 '+neg+'</span><span class="tag t1">中性 '+(nt.length-pos-neg)+'</span></div>'+nt.slice(0,6).map(function(r){return'<span class="tag t1">'+(r.s||"")+": "+(r.n||"").substring(0,40)+'</span>'}).join(" ");var campus={};d.forEach(function(r){if(r.c)campus[r.c]=(campus[r.c]||0)+1});var sc={};d.forEach(function(r){if(r.sc)sc[r.sc]=(sc[r.sc]||0)+1});var dh="";Object.entries(campus).sort(function(a,b){return b[1]-a[1]}).forEach(function(kv){dh+='<span class="tag t1">'+kv[0]+": "+kv[1]+"条</span> "});Object.entries(sc).sort(function(a,b){return b[1]-a[1]}).forEach(function(kv){dh+='<span class="tag t2">'+kv[0]+": "+kv[1]+"条</span> "});document.getElementById("dist").innerHTML=dh||'<span class=empty-state>暂无数据</span>'}
