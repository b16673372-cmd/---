<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>客户需求分析 · 干部端</title>
<style>:root{--navy:#001FC5;--blue:#1F51D6;--mid:#2E75B6;--deep:#1F3864;--gold:#FFC000;--orange:#ED7D31;--bg:#EEF4FA;--text:#1a1a2e;--sub:#788;--red:#C0392B;--green:#27AE60}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:"微软雅黑","PingFang SC",sans-serif;background:#f0f2f5;min-height:100vh}
.topbar{background:linear-gradient(135deg,var(--deep),var(--navy));color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar .xg{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--orange));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#fff;flex-shrink:0}
.topbar h2{font-size:16px;flex:1}.topbar .logout{font-size:11px;opacity:.6;cursor:pointer}
.content{max-width:700px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card h3{font-size:14px;color:var(--deep);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.stat{flex:1;min-width:60px;background:var(--bg);border-radius:10px;padding:10px 6px;text-align:center}
.stat .n{font-size:20px;font-weight:bold;color:var(--navy)}.stat .l{font-size:9px;color:var(--sub);margin-top:2px}
.stat.warn .n{color:var(--orange)}.stat.good .n{color:var(--green)}.stat.hot .n{color:var(--red)}
.metric-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.metric{flex:1;min-width:80px;padding:8px 10px;border-radius:8px;text-align:center;font-size:11px}
.metric .mv{font-size:18px;font-weight:bold}.metric .ml{font-size:9px;color:var(--sub)}
.mg{background:#EEF4FA}.mg .mv{color:var(--navy)}.my{background:#FFF8E1}.my .mv{color:#B8860B}.mr{background:#FFEBEE}.mr .mv{color:var(--red)}.mk{background:#E8F5E9}.mk .mv{color:var(--green)}
.top5 li{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.top5 .rk{width:20px;height:20px;border-radius:5px;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0}
.top5 li:nth-child(1) .rk{background:var(--navy)}.top5 li:nth-child(2) .rk{background:var(--blue)}.top5 li:nth-child(3) .rk{background:var(--mid)}.top5 li:nth-child(n+4) .rk{background:var(--light)}
.top5 .cnt{margin-left:auto;font-weight:bold;color:var(--blue);font-size:13px}
.top5 .bar{flex:1;height:6px;background:#eee;border-radius:3px;margin:0 8px}.top5 .bar .fill{height:100%;border-radius:3px;background:var(--blue)}
.alert-item{padding:6px 10px;background:#FFF8E1;border-radius:6px;font-size:11px;margin-bottom:3px;border-left:3px solid var(--gold);display:flex;align-items:center;gap:8px}
.alert-item .risk{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:bold}.risk-h{background:#FFEBEE;color:var(--red)}.risk-m{background:#FFF8E1;color:#B8860B}.risk-l{background:#E8F5E9;color:var(--green)}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;margin:2px;background:var(--bg);color:var(--deep)}
.tag.hot{background:#FFF3CD;color:#B8860B}.tag.pos{background:#E8F5E9;color:#2E7D32}
textarea{width:100%;height:80px;border:2px solid #E0E4EC;border-radius:10px;padding:10px;font-size:11px;font-family:monospace;resize:vertical;margin-bottom:6px}
textarea:focus{outline:none;border-color:var(--blue)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:bold;font-size:13px;cursor:pointer;font-family:inherit;color:#fff;background:linear-gradient(135deg,var(--navy),var(--blue));margin-bottom:6px}
.btn2{background:var(--bg);color:var(--blue);border:1.5px solid #D0D8E8}
.row2{display:flex;gap:8px}.row2>*{flex:1}
.login-pop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:99;display:flex;justify-content:center;align-items:center}
.login-box{background:#fff;border-radius:16px;padding:30px;text-align:center;width:320px}
.login-box .xg2{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--orange));display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#fff;margin-bottom:12px}
.login-box h3{color:var(--deep);margin-bottom:4px}.login-box p{font-size:12px;color:var(--sub);margin-bottom:14px}
.login-box input{width:100%;padding:12px;border:2px solid #E0E4EC;border-radius:12px;font-size:14px;text-align:center;font-family:inherit;margin-bottom:8px}
.login-box input:focus{outline:none;border-color:var(--blue)}.login-box .err{color:var(--red);font-size:11px;display:none;margin-bottom:6px}
.login-box .pb{width:100%;padding:12px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-size:14px;margin-top:6px}
.report{display:none;background:#fff;border-radius:14px;padding:20px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);line-height:2}
.report.on{display:block}
.report h2{font-size:18px;color:var(--navy);text-align:center;margin-bottom:4px;padding-bottom:10px;border-bottom:2px solid var(--navy)}
.report h3{font-size:13px;color:var(--deep);margin:14px 0 6px}
.report p{font-size:11px;color:var(--sub);margin:4px 0}
.report .exec-summary{background:var(--bg);padding:12px;border-radius:8px;font-size:12px;color:var(--text);margin:10px 0;line-height:1.8}
.report .act-item{display:flex;gap:8px;padding:6px 0;font-size:11px}
.report .act-prio{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#fff;flex-shrink:0}.prio-0{background:var(--red)}.prio-1{background:var(--orange)}.prio-2{background:var(--blue)}
@media print{.topbar,.btn,.login-pop,.card textarea,.card .btn,.card .btn2{display:none!important}.report{display:block!important;box-shadow:none}.content{max-width:100%;padding:0}}</style></head><body>
<div class="login-pop" id="lp"><div class="login-box"><div class="xg2">G</div><h3>客户需求分析系统</h3><p>干部端 · 专业洞察</p><input type="password" id="pw" placeholder="请输入密码"><div class="err" id="er">密码错误</div><button class="pb" id="lb">验证进入</button></div></div>
<div id="ma" style="display:none"><div class="topbar"><div class="xg">G</div><h2>客户需求分析 · 干部端</h2><span class="logout" id="lo">退出</span></div>
<div class="content">

<div class="stats" id="sa"><div class="stat"><div class="n">0</div><div class="l">加载中...</div></div></div>

<div class="card"><h3>📊 业务健康度仪表盘</h3><div class="metric-row" id="metricsArea"></div></div>

<div class="card"><h3>🔥 高频需求 Top5</h3><ul class="top5" id="t5"><li style="color:var(--sub);text-align:center;padding:12px;font-size:12px">暂无数据</li></ul></div>

<div class="card"><h3>⚠️ 学生流失风险预警</h3><div id="ab" style="font-size:12px;color:var(--sub)">暂无预警</div></div>

<div class="card"><h3>👨‍👩‍👧 家长情感分析</h3><div id="pb" style="font-size:12px;color:var(--sub)">暂无数据</div></div>

<div class="card"><h3>🏫 校区/场景数据分布</h3><div id="dist" style="font-size:12px;color:var(--sub)">暂无数据</div></div>

<div class="card"><h3>📥 数据导入</h3><textarea id="ci" placeholder="粘贴教师CSV内容（可多次粘贴追加）"></textarea>
<div class="row2"><button class="btn" id="mb">合并刷新</button><button class="btn2 btn" id="cb">清空数据</button></div></div>

<div class="row2"><button class="btn" id="genReport" style="background:linear-gradient(135deg,var(--deep),var(--navy))">📄 生成专业分析报告</button></div>

<div class="report" id="reportArea"></div>
</div></div>

<script>
var d=[],P="jksx1234";
function S(){localStorage.setItem("mg_data",JSON.stringify(d))}
function L(){var s=localStorage.getItem("mg_data");if(s)d=JSON.parse(s)}
function parseCSV(line){var r=[],cu="",q=false;for(var j=0;j<line.length;j++){var ch=line[j];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(cu.trim());cu=""}else cu+=ch}r.push(cu.trim());return r}

function R(){
  var sa=document.getElementById("sa"),N=d.length;
  var tSet=new Set(d.map(function(r){return r.t})),sSet=new Set(d.map(function(r){return r.s}));
  var warns=d.filter(function(r){return(r.st||"").indexOf("不想")>=0||(r.st||"").indexOf("无意向")>=0}).length;
  var sceneExp=d.filter(function(r){return(r.sc||"").indexOf("体验")>=0}).length;
  var sceneHW=d.filter(function(r){return(r.sc||"").indexOf("答疑")>=0}).length;
  var sceneSP=d.filter(function(r){return(r.sc||"").indexOf("冲刺")>=0}).length;
  sa.innerHTML='<div class=stat><div class=n>'+N+'</div><div class=l>总记录</div></div><div class=stat><div class=n>'+tSet.size+'</div><div class=l>教师数</div></div><div class=stat><div class=n>'+sSet.size+'</div><div class=l>学生数</div></div><div class="stat warn"><div class=n>'+warns+'</div><div class=l>⚠需关注</div></div><div class=stat><div class=n>'+sceneExp+'</div><div class=l>体验课</div></div><div class=stat><div class=n>'+sceneHW+'</div><div class=l>答疑课</div></div><div class=stat><div class=n>'+sceneSP+'</div><div class=l>冲刺课</div></div>';

  // Health dashboard - industry benchmarks
  var retRate=d.length>0?Math.round((d.length-warns)/Math.max(d.length,1)*100):0;
  var teachRate=tSet.size>0?Math.round(N/Math.max(tSet.size,1)):'-';
  document.getElementById("metricsArea").innerHTML=
    '<div class="metric mg"><div class="mv">'+retRate+'%</div><div class="ml">健康度<br>(目标>80)</div></div>'+
    '<div class="metric mg"><div class="mv">'+tSet.size+'</div><div class="ml">活跃教师<br>(目标>5)</div></div>'+
    '<div class="metric mg"><div class="mv">'+teachRate+'</div><div class="ml">人均记录<br>(目标>5)</div></div>'+
    (warns>0?'<div class="metric mr"><div class="mv">'+warns+'</div><div class="ml">高危学生<br>(需跟进)</div></div>':'<div class="metric mk"><div class="mv">0</div><div class="ml">高危学生<br>(全部安全)</div></div>')+
    '<div class="metric mg"><div class="mv">'+(d.filter(function(r){return r.n&&r.n.length>3}).length)+'</div><div class="ml">家长反馈<br>有记录</div></div>';

  // Top5 with percentage bars
  var ps={};d.forEach(function(r){(r.p||"").split("/").forEach(function(p){if(p)ps[p]=(ps[p]||0)+1})});
  var maxC=Math.max.apply(null,Object.values(ps))||1;
  var so=Object.entries(ps).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  document.getElementById("t5").innerHTML=so.length===0?'<li style="color:var(--sub);text-align:center;padding:12px;font-size:12px">暂无数据</li>':
    so.map(function(kv,i){var pct=Math.round(kv[1]/maxC*100);return'<li><div class=rk>'+(i+1)+'</div>'+kv[0]+'<div class=bar><div class=fill style=width:'+pct+'%></div></div><span class=cnt>'+kv[1]+'次</span></li>'}).join("");

  // Risk assessment with levels
  var ws=d.filter(function(r){return(r.st||"").indexOf("不想")>=0||(r.st||"").indexOf("无意向")>=0});
  document.getElementById("ab").innerHTML=ws.length===0?"<span style=color:var(--green)>✓ 暂无高风险学生</span>":
    ws.slice(0,6).map(function(r){var level=(r.st||"").indexOf("不想")>=0?"H":"M";return'<div class=alert-item><span class=risk risk-'+level.toLowerCase()+'">'+(level==="H"?"高危":"中危")+'</span>'+(r.s||"?")+" · "+(r.sc||"")+" · "+(r.st||"")+" · "+(r.t||"")+"</div>"}).join("");

  // Parent sentiment
  var nt=d.filter(function(r){return r.n&&r.n.length>3});
  var pos=nt.filter(function(r){return(r.n||"").indexOf("满意")>=0||(r.n||"").indexOf("喜欢")>=0||(r.n||"").indexOf("好")>=0}).length;
  var neg=nt.filter(function(r){return(r.n||"").indexOf("不满")>=0||(r.n||"").indexOf("差")>=0||(r.n||"").indexOf("问题")>=0}).length;
  document.getElementById("pb").innerHTML=nt.length===0?"暂无家长反馈数据":
    "<div style=margin-bottom:6px><span class='tag pos'>😊 正面 "+pos+"</span><span class='tag hot'>😟 负面 "+neg+"</span><span class=tag>💬 中性 "+(nt.length-pos-neg)+"</span></div>"+
    nt.slice(0,6).map(function(r){return'<span class=tag'+(pos>neg?' pos':'')+'>'+(r.s||"")+": "+(r.n||"").substring(0,35)+'</span>'}).join(" ");

  // Distribution
  var campus={};d.forEach(function(r){if(r.c)campus[r.c]=(campus[r.c]||0)+1});
  var distHTML="";
  Object.entries(campus).sort(function(a,b){return b[1]-a[1]}).forEach(function(kv){distHTML+="<span class=tag>"+kv[0]+": "+kv[1]+"条</span> "});
  distHTML+=distHTML?" | 场景: ":"";
  var sc={};d.forEach(function(r){if(r.sc)sc[r.sc]=(sc[r.sc]||0)+1});
  Object.entries(sc).sort(function(a,b){return b[1]-a[1]}).forEach(function(kv){distHTML+="<span class=tag>"+kv[0]+": "+kv[1]+"条</span> "});
  document.getElementById("dist").innerHTML=distHTML||"暂无分布数据";
}

// Professional Report Generation
function genReportHTML(){
  var N=d.length,tSet=new Set(d.map(function(r){return r.t})),sSet=new Set(d.map(function(r){return r.s}));
  var warns=d.filter(function(r){return(r.st||"").indexOf("不想")>=0||(r.st||"").indexOf("无意向")>=0});
  var ps={};d.forEach(function(r){(r.p||"").split("/").forEach(function(p){if(p)ps[p]=(ps[p]||0)+1})});
  var so=Object.entries(ps).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var nt=d.filter(function(r){return r.n&&r.n.length>3});
  var campus={};d.forEach(function(r){if(r.c)campus[r.c]=(campus[r.c]||0)+1});
  var sc={};d.forEach(function(r){if(r.sc)sc[r.sc]=(sc[r.sc]||0)+1});
  var retRate=d.length>0?Math.round((d.length-warns.length)/Math.max(d.length,1)*100):0;
  var maxC=Math.max.apply(null,Object.values(ps))||1;
  var now=new Date().toLocaleDateString();

  var h='<div class=report on id=reportContent><h2>客户需求洞察报告</h2><p style=text-align:center>顺德区域 · '+now+' · 共'+N+'条需求记录</p>';
  h+='<h3>一、执行摘要</h3><div class=exec-summary>本周期共收集<b>'+N+'</b>条客户需求数据，覆盖<b>'+tSet.size+'</b>名教师、<b>'+sSet.size+'</b>名学生。业务健康度<b>'+retRate+'%</b>'+(retRate>=80?'，处于健康区间。':(retRate>=60?'，需关注提升。':'，<b style=color:var(--red)>需立即干预</b>。'))+(warns.length>0?'<b>'+warns.length+'</b>名学生存在流失风险，建议本周内逐一跟进。':'目前无高风险学生。')+'</div>';

  h+='<h3>二、高频需求分析</h3>';
  if(so.length===0)h+='<p>暂无足够数据</p>';
  else{so.forEach(function(kv,i){var pct=Math.round(kv[1]/maxC*100);h+='<div class=act-item><span class=act-prio prio-'+(i<2?0:i<4?1:2)+'>'+(i+1)+'</span>'+kv[0]+' — <b>'+kv[1]+'次 ('+pct+'%)</b></div>'});}
  h+='<p style="color:var(--sub);margin-top:6px"><b>分析：</b>'+(so.length>0?'最高频需求为「<b>'+so[0][0]+'</b>」，建议在碰头会中讨论应对策略，安排专题练习或教学方法调整。':'积累更多数据后将自动生成趋势分析。')+'</p>';

  h+='<h3>三、学生流失风险评估</h3>';
  if(warns.length===0)h+='<p style=color:var(--green)>✓ 当前无高风险学生，续报意愿整体良好。</p>';
  else{h+='<p>以下<b>'+warns.length+'</b>名学生需重点关注：</p>';warns.slice(0,8).forEach(function(r){h+='<div class=act-item><span class="act-prio prio-'+(r.st||"").indexOf("不想")>=0?"0":"1"+'">!</span>'+(r.s||"?")+" · "+(r.sc||"")+" · "+(r.st||"")+" · 教师:"+(r.t||"")+"</div>"});}

  h+='<h3>四、家长情感分析</h3>';
  if(nt.length===0)h+='<p>暂无家长反馈数据。</p>';
  else{var pos=nt.filter(function(r){return(r.n||"").indexOf("满意")>=0||(r.n||"").indexOf("喜欢")>=0||(r.n||"").indexOf("好")>=0}).length;var neg=nt.filter(function(r){return(r.n||"").indexOf("不满")>=0||(r.n||"").indexOf("差")>=0||(r.n||"").indexOf("问题")>=0}).length;h+='<p>正面反馈 '+pos+' 条 | 负面 '+neg+' 条 | 中性 '+(nt.length-pos-neg)+' 条</p>';nt.slice(0,6).forEach(function(r){h+='<div class=act-item>💬 '+(r.s||"")+': '+(r.n||"")+'</div>'});}

  h+='<h3>五、校区与场景分布</h3><div style=font-size:12px>';
  Object.entries(campus).sort(function(a,b){return b[1]-a[1]}).forEach(function(kv){h+="<span class=tag>"+kv[0]+": "+kv[1]+"条</span> "});
  h+='<br>';Object.entries(sc).sort(function(a,b){return b[1]-a[1]}).forEach(function(kv){h+="<span class=tag>"+kv[0]+": "+kv[1]+"条</span> "});
  h+='</div>';

  h+='<h3>六、本周行动建议（基于数据推断）</h3>';
  if(so.length>0){h+='<div class=act-item><span class=act-prio prio-0>P0</span>针对最高频「'+so[0][0]+'」安排专项教学调整或练习材料</div>';}
  if(warns.length>0){h+='<div class=act-item><span class=act-prio prio-0>P0</span>逐一跟进'+warns.length+'名高风险学生，48小时内完成首次沟通</div>';}
  h+='<div class=act-item><span class=act-prio prio-1>P1</span>下周碰头会讨论Top3需求，确定响应动作并录入追踪</div>';
  h+='<div class=act-item><span class=act-prio prio-2>P2</span>持续收集数据，目标：每周≥50条记录，覆盖全部教师</div>';
  h+='<p style=font-size:10px;color:var(--sub);margin-top:12px">报告基于'+N+'条数据自动生成 · 极客素养中心 · 顺德校区</p></div>';
  return h;
}

// Event handlers
document.getElementById("lb").onclick=function(){if(document.getElementById("pw").value===P){document.getElementById("lp").style.display="none";document.getElementById("ma").style.display="block";L();R()}else{document.getElementById("er").style.display="block";document.getElementById("pw").value=""}};
document.getElementById("pw").onkeydown=function(e){if(e.key==="Enter")document.getElementById("lb").click()};
document.getElementById("lo").onclick=function(){location.reload()};
document.getElementById("mb").onclick=function(){var c=document.getElementById("ci").value.trim();if(!c)return;var ls=c.split("\n");for(var i=0;i<ls.length;i++){var l=ls[i].trim();if(!l)continue;if(l.charCodeAt(0)===65279)l=l.substring(1);if(l.indexOf("时间")>=0)continue;var cs=parseCSV(l);if(cs.length>=5)d.push({t:cs[1]||"",c:cs[2]||"",sc:cs[3]||"",s:cs[4]||"",p:cs[5]||"",st:cs[6]||"",n:cs[7]||"",time:cs[0]||""})}document.getElementById("ci").value="";S();R()};
document.getElementById("cb").onclick=function(){if(confirm("确定清空所有数据？此操作不可恢复。")){d=[];S();R()}};
document.getElementById("genReport").onclick=function(){if(d.length===0){alert("请先粘贴教师CSV数据");return}var rpt=document.getElementById("reportArea");rpt.innerHTML=genReportHTML();rpt.classList.add("on");rpt.scrollIntoView({behavior:"smooth"})};
R();</script></body></html>
