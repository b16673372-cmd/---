<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>极客 · 家校沟通</title>
<style>
:root{--navy:#001FC5;--blue:#1F51D6;--mid:#4A90D9;--light:#8EC8E8;--deep:#1F3864;--gold:#FFC000;--warm:#F5A623;--bg:#F5F7FB;--card:#fff;--text:#2a2a2a;--sub:#888;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"微软雅黑","PingFang SC",-apple-system,sans-serif;background:linear-gradient(170deg,#D8E4F4,#E4EDF8,#F0F2F8);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:14px}
.phone{width:100%;max-width:430px;background:linear-gradient(180deg,#EEF2F9,#F2F5FB,#F8F7F4);border-radius:22px;overflow:hidden;box-shadow:0 16px 48px rgba(0,31,197,.08);min-height:700px;position:relative}

/* Cover */
.cover{background:linear-gradient(170deg,#DCE6F5 0%,#E4EDF8 30%,#F5F2EC 70%,#FAF6ED 100%);text-align:center;padding:40px 24px 32px;position:relative;overflow:hidden}
.cover::before{content:'';position:absolute;left:-40px;top:-40px;width:140px;height:140px;border-radius:50%;background:rgba(31,81,214,.04)}
.cover::after{content:'';position:absolute;right:-30px;bottom:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,192,0,.06)}
.cover-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--warm));color:#fff;padding:5px 14px;border-radius:14px;font-size:11px;font-weight:bold;margin-bottom:16px;position:relative;z-index:1}
.cover-xg{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--blue),var(--mid));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;color:#fff;margin:0 auto 16px;position:relative;z-index:1;box-shadow:0 6px 24px rgba(31,81,214,.2)}
.cover-xg::after{content:'♥';position:absolute;top:-6px;right:-6px;font-size:16px}
.cover h2{font-size:22px;color:var(--deep);position:relative;z-index:1;margin-bottom:6px}
.cover .sub{font-size:13px;color:var(--sub);position:relative;z-index:1;line-height:1.7;max-width:300px;margin:0 auto}
.cover-intro{background:rgba(245,248,252,.9);border-radius:14px;padding:16px;margin-top:20px;position:relative;z-index:1;font-size:13px;color:#666;line-height:1.8;text-align:left;border:1px solid rgba(31,81,214,.08)}
.cover-intro .hi{font-size:16px;color:var(--deep);font-weight:bold;margin-bottom:4px}

.content{padding:14px 20px 24px;max-height:560px;overflow-y:auto;background:linear-gradient(180deg,#F2F5FA,#F8F7F5)}
.page{display:none}.page.on{display:block;animation:in .3s ease}@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.lbl{font-size:14px;font-weight:bold;color:var(--text);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.lbl .num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--mid));color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lbl .hint{font-weight:normal;font-size:11px;color:var(--sub);margin-left:auto}

.rrow{display:flex;gap:8px;flex-wrap:wrap}.rbtn{flex:1;min-width:60px;text-align:center;padding:14px 6px;border:2px solid #D8DFEC;border-radius:14px;cursor:pointer;font-size:13px;background:#F0F3F8;transition:.15s;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}.rbtn:active{transform:scale(.97)}.rbtn.on{border-color:var(--blue);background:#DCE6F5;color:var(--navy);font-weight:bold;position:relative;z-index:1}

.crow{display:flex;flex-wrap:wrap;gap:7px}.cbtn{padding:10px 15px;border:1.5px solid #E0E4EC;border-radius:20px;cursor:pointer;font-size:13px;background:#EEF2F8;transition:.15s;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;z-index:1}.cbtn:active{transform:scale(.97)}.cbtn.on{border-color:var(--blue);background:var(--blue);color:#fff}

.erow{display:flex;gap:9px}.ebtn{flex:1;text-align:center;padding:14px 4px;border:2px solid #E0E4EC;border-radius:14px;cursor:pointer;transition:.15s;background:#EEF2F8;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;z-index:1}.ebtn:active{transform:scale(.97)}.ebtn.on{border-color:var(--gold);background:#FFFDF5;transform:scale(1.04)}.ebtn .em{font-size:30px;display:block;margin-bottom:3px}.ebtn .el{font-size:11px;color:var(--sub)}

.inp{width:100%;padding:12px;border:2px solid #D0D8E8;border-radius:14px;font-size:14px;font-family:inherit;margin-bottom:8px;background:#F2F5FA}.inp:focus{outline:none;border-color:var(--blue)}

.txa{width:100%;padding:14px;border:2px solid #D0D8E8;border-radius:14px;font-size:14px;font-family:inherit;resize:none;height:80px;margin-bottom:8px;background:#F2F5FA}.txa:focus{outline:none;border-color:var(--blue)}
.txa::placeholder{color:#CCC}

.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;transition:.15s;background:linear-gradient(135deg,var(--blue),var(--mid));color:#fff;margin-top:12px;box-shadow:0 4px 16px rgba(31,81,214,.15)}
.btn:active{transform:scale(.98)}

.section-divider{text-align:center;margin:16px 0 10px;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:10px}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:#E0E4EC}
.section-divider .ico{font-size:16px}

.thank-you{text-align:center;padding:30px 20px}
.thank-you .ty-icon{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--warm));display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;margin:0 auto 20px;box-shadow:0 8px 32px rgba(255,192,0,.25)}
.thank-you h3{font-size:20px;color:var(--deep);margin-bottom:6px}
.thank-you .msg{font-size:13px;color:var(--sub);line-height:1.8;margin:12px 0}
.thank-you .promise{background:linear-gradient(135deg,#FFFDF5,#FFF8E1);border-radius:14px;padding:14px;font-size:13px;color:#8B6914;line-height:1.7;text-align:left}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--deep);color:#fff;padding:12px 24px;border-radius:12px;z-index:999;font-size:14px;font-weight:bold;animation:toastIn .3s ease,toastOut .3s ease 1.7s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

.sec-title{font-size:13px;font-weight:bold;color:var(--deep);margin:18px 0 8px;padding:10px 14px;background:linear-gradient(90deg,#DCE6F5,#EDF2F9);border-radius:10px;display:flex;align-items:center;gap:6px;border-left:3px solid var(--mid)}
</style>
</head>
<body>
<div class="phone" id="app">
<div id="toastContainer"></div>

<!-- COVER -->
<div class="cover page on" id="coverPage">
  <div class="cover-badge">🌟 家校沟通</div>
  <div class="cover-xg">G</div>
  <h2>听听您和孩子的想法</h2>
  <div class="sub">我们来到顺德不久<br>特别想了解每个孩子的真实情况</div>
  <div class="cover-intro">
    <div class="hi">👋 亲爱的家长朋友：</div>
    感谢您选择极客。我们相信，只有真正了解孩子的学习状态和您的期望，才能给孩子最适合的帮助。<br><br>下面的问题请您和孩子一起填写——<b>没有标准答案，没有对错</b>，您的每一条反馈我们都会认真看。
  </div>
  <button class="btn" onclick="startForm()" style="margin-top:20px">开始填写 ✍️</button>
  <p style="font-size:10px;color:#BBB;margin-top:8px">约2分钟完成 · 您的信息仅老师可见</p>
  <p style="font-size:10px;color:#CCC;margin-top:20px;cursor:pointer" onclick="showLogin()">📊 查看汇总</p>
</div>

<!-- ADMIN LOGIN -->
<div class="page" id="loginPage" style="display:none">
  <div style="text-align:center;padding:50px 30px">
    <div style="font-size:48px;margin-bottom:16px">🔐</div>
    <h3 style="color:var(--deep);margin-bottom:4px">管理员验证</h3>
    <p style="color:var(--sub);font-size:13px;margin-bottom:20px">输入密码查看家长反馈汇总</p>
    <input class="inp" id="adminPwd" type="password" placeholder="请输入密码" style="text-align:center;max-width:260px;margin:0 auto 12px;display:block">
    <p style="color:var(--red);font-size:12px;display:none" id="loginErr">密码错误</p>
    <button class="btn" onclick="checkAdmin()" style="max-width:260px;margin:8px auto;display:block">验证进入</button>
    <button class="btn" onclick="hide('loginPage');show('coverPage')" style="max-width:260px;margin:4px auto;display:block;background:var(--bg);color:var(--blue);border:1.5px solid #D0D8E8">← 返回</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="page" id="dashPage" style="display:none">
  <div style="background:linear-gradient(135deg,var(--deep),var(--blue));padding:16px 18px;color:#fff;display:flex;align-items:center;gap:10px;border-radius:0 0 16px 16px">
    <span onclick="hide('dashPage');show('coverPage')" style="font-size:20px;cursor:pointer">←</span>
    <div><div style="font-weight:bold;font-size:15px">家长反馈汇总</div><div style="font-size:10px;opacity:.7" id="dashCount">0 条反馈</div></div>
  </div>
  <div class="content" style="padding:14px 18px" id="dashContent"></div>
</div>

<!-- FORM SCREEN -->
<div class="page" id="formScreen" style="display:none">
  <div style="background:linear-gradient(135deg,var(--deep),var(--blue));padding:14px 18px;color:#fff;display:flex;align-items:center;gap:10px;border-radius:0 0 16px 16px">
    <span style="font-size:20px">💬</span>
    <div><div style="font-weight:bold;font-size:15px">极客 · 家校沟通</div><div style="font-size:10px;opacity:.7">您的想法对我们很重要</div></div>
  </div>
  <div class="content" id="formContent"></div>
</div>
</div>

<script>
var form={};
function g(id){return document.getElementById(id)}
function q(sel){return document.querySelectorAll(sel)}
function show(id){g(id).classList.add('on')}
function hide(id){g(id).classList.remove('on')}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;g('toastContainer').appendChild(t);setTimeout(function(){t.remove()},2000)}

function startForm(){
  hide('coverPage');g('formScreen').style.display='block';renderForm();
}

function renderQ(q){
  if(q.type==='radio'){var h='<div class="rrow" data-fid="'+q.id+'">';q.opts.forEach(function(o){h+='<div class="rbtn'+(form[q.id]===o?' on':'')+'" data-v="'+o+'">'+o+'</div>'});return h+'</div>'}
  if(q.type==='chips'){var h='<div class="crow" data-fid="'+q.id+'">';q.opts.forEach(function(o){h+='<div class="cbtn'+((form[q.id]||[]).includes(o)?' on':'')+'" data-v="'+o+'">'+o+'</div>'});return h+'</div>'}
  if(q.type==='emoji'){var h='<div class="erow" data-fid="'+q.id+'">';q.opts.forEach(function(o){h+='<div class="ebtn'+(form[q.id]===o.v?' on':'')+'" data-v="'+o.v+'"><span class="em">'+o.e+'</span><span class="el">'+o.l+'</span></div>'});return h+'</div>'}
  return '';
}

function renderForm(){
  var h='<div class="page on" id="formAll">';

  // Basic info
  h+='<div class="sec-title">👨‍👩‍👧 基本信息</div>';
  h+='<div style="display:flex;gap:8px"><input class="inp" id="childName" placeholder="孩子的名字" style="flex:1"><input class="inp" id="childGrade" placeholder="年级（如：三年级）" style="flex:1"></div>';

  // Part 1: Parent feedback
  h+='<div class="sec-title">👩 家长，您的观察很重要</div>';

  var parentQs=[
    {id:'hwHabit',type:'radio',label:'孩子在家做作业的状态是？',opts:['主动完成，不用催','需要提醒一下','要反复催促','经常抗拒不写']},
    {id:'improveArea',type:'chips',label:'您最希望孩子在哪方面提升？（可多选）',opts:['计算能力','应用题理解','学习习惯','自信心','数学兴趣','考试技巧','作业效率','逻辑思维']},
    {id:'communicate',type:'radio',label:'您觉得我们和您的沟通够及时吗？',opts:['很及时，很满意','还可以','有时候不知道孩子情况','沟通太少，希望加强']},
    {id:'worry',type:'chips',label:'您对孩子学习最大的担心是什么？（可多选）',opts:['跟不上学校进度','对数学没兴趣','考试焦虑','作业拖拉','基础薄弱','缺乏学习方法','性格内向不爱问','其他']},
    {id:'summerPlan',type:'radio',label:'暑假您有给孩子安排补习的计划吗？',opts:['已经有安排','还在考虑中','暂时没有计划','想听听老师建议']},
    {id:'refer',type:'radio',label:'您愿意把极客推荐给朋友吗？',opts:['非常愿意','愿意','看情况','不太愿意']},
  ];
  parentQs.forEach(function(q,i){h+='<div class="lbl" style="font-size:13px">'+(i+1)+'. '+q.label+'</div>'+renderQ(q)});

  // Part 2: Child feelings
  h+='<div class="sec-title">😊 孩子，来回答这几个问题</div>';
  h+='<p style="font-size:12px;color:var(--sub);margin-bottom:8px">以下问题请让孩子自己选，家长帮忙点就好~</p>';

  var childQs=[
    {id:'feeling',type:'emoji',label:'你来极客上课开心吗？',opts:[{v:'很开心',e:'😍',l:'很开心'},{v:'还不错',e:'😊',l:'还不错'},{v:'一般般',e:'😐',l:'一般'},{v:'不太喜欢',e:'😟',l:'不太喜欢'}]},
    {id:'likeMost',type:'chips',label:'你最喜欢课堂上的什么？（可多选）',opts:['老师讲得好','题目很有趣','能和同学一起','有挑战的感觉','被老师表扬','学到新知识','教室环境好','其他']},
    {id:'difficulty',type:'radio',label:'你觉得上课的内容难吗？',opts:['太简单了','刚刚好','有点难','太难了听不懂']},
    {id:'teacherLike',type:'emoji',label:'你喜欢你的老师吗？',opts:[{v:'超级喜欢',e:'💯',l:'超级喜欢'},{v:'喜欢',e:'😊',l:'喜欢'},{v:'还行',e:'🙂',l:'还行'},{v:'不太喜欢',e:'😐',l:'不太喜欢'}]},
  ];
  childQs.forEach(function(q,i){h+='<div class="lbl" style="font-size:13px">'+(i+1)+'. '+q.label+'</div>'+renderQ(q)});

  // Part 3: Open-ended
  h+='<div class="sec-title">💌 想对老师说的话</div>';
  h+='<textarea class="txa" id="toTeacher" placeholder="有什么想告诉老师的？开心的、担心的、建议的……都可以写在这里。如果不方便写，留空也没关系。"></textarea>';

  // Part 4: Service feedback
  h+='<div class="sec-title">🌟 一句话感受</div>';
  h+='<div class="rrow" data-fid="overall">';
  ['非常满意','比较满意','一般','不太满意'].forEach(function(o){h+='<div class="rbtn'+(form.overall===o?' on':'')+'" data-v="'+o+'">'+o+'</div>'});
  h+='</div>';

  // Submit
  h+='<button class="btn" id="submitBtn" style="background:linear-gradient(135deg,var(--gold),var(--warm));color:#fff;margin-top:20px">💌 告诉老师</button>';
  h+='<p style="text-align:center;font-size:10px;color:#BBB;margin-top:6px">提交后老师会在3天内给您回应</p>';

  g('formContent').innerHTML=h;

  // Bind events (use pointerdown for mobile)
  g('formContent').addEventListener('pointerdown',function(e){
    var btn=e.target.closest('.rbtn,.ebtn');
    if(btn){e.preventDefault();var row=btn.parentElement;row.querySelectorAll('.rbtn,.ebtn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on');form[row.dataset.fid]=btn.dataset.v;return}
    btn=e.target.closest('.cbtn');
    if(btn){e.preventDefault();btn.classList.toggle('on');var vals=[];btn.parentElement.querySelectorAll('.cbtn.on').forEach(function(c){vals.push(c.dataset.v)});form[btn.parentElement.dataset.fid]=vals;return}
  });

  g('submitBtn').addEventListener('click',function(){
    form.childName=g('childName').value||'未填';
    form.childGrade=g('childGrade').value||'未填';
    form.toTeacher=g('toTeacher').value;
    form.time=new Date().toISOString();
    var records=JSON.parse(localStorage.geek_parent||'[]');
    records.push({...form});
    localStorage.geek_parent=JSON.stringify(records);
    renderThankYou();
  });
}

function renderThankYou(){
  var h='<div class="thank-you"><div class="ty-icon">💌</div><h3>收到啦！</h3><p class="msg">感谢您抽出时间和我们交流。<br>您的每一条反馈，都是我们进步的动力。</p>';
  h+='<div class="promise"><b>🌟 我们的承诺：</b><br>· 老师会在3天内回应您的反馈<br>· 您的建议将直接影响我们的教学安排<br>· 所有信息严格保密，仅学科负责人和任课老师可见</div>';
  h+='<p style="font-size:11px;color:#BBB;margin-top:16px">极客素养中心 · 顺德校区<br>用心对待每一个孩子</p></div>';
  g('formContent').innerHTML='<div class="page on">'+h+'</div>';
}

function showLogin(){hide('coverPage');g('loginPage').style.display='block'}
function checkAdmin(){
  var p=g('adminPwd').value;
  if(p==='jike2026'||p==='jike2025'){
    g('loginPage').style.display='none';g('dashPage').style.display='block';renderDash();g('adminPwd').value='';
  }else{g('loginErr').style.display='block';g('adminPwd').value=''}
}
g('adminPwd').addEventListener('keydown',function(e){if(e.key==='Enter')checkAdmin()});

function renderDash(){
  var records=JSON.parse(localStorage.geek_parent||'[]');
  g('dashCount').textContent=records.length+' 条反馈';
  var h='<div style="display:flex;gap:8px;margin-bottom:12px">';
  h+='<div class="rbtn on" style="flex:1;font-size:12px;padding:10px">📋 '+records.length+'<br><span style="font-size:10px">总反馈</span></div>';
  var feelGood=records.filter(function(r){return r.overall==='非常满意'||r.overall==='比较满意'}).length;
  h+='<div class="rbtn" style="flex:1;font-size:12px;padding:10px;border-color:#27AE60;background:#E8F5E9">😊 '+feelGood+'<br><span style="font-size:10px">满意</span></div>';
  var feelBad=records.filter(function(r){return r.overall==='不太满意'}).length;
  h+='<div class="rbtn" style="flex:1;font-size:12px;padding:10px;border-color:#C0392B;background:#FFEBEE">😟 '+feelBad+'<br><span style="font-size:10px">不满意</span></div>';
  h+='</div>';

  // Top concerns
  var concerns={};records.forEach(function(r){(r.worry||[]).forEach(function(w){concerns[w]=(concerns[w]||0)+1})});
  var sorted=Object.entries(concerns).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  if(sorted.length>0){h+='<div class="sec-title">😟 家长最担心的问题</div>';sorted.forEach(function(kv,i){h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid #F0F0F0"><div class="num" style="width:22px;height:22px;font-size:10px">'+(i+1)+'</div>'+kv[0]+'<span style="margin-left:auto;font-weight:bold;color:var(--blue)">'+kv[1]+'人</span></div>'})}

  // Top improvements
  var imps={};records.forEach(function(r){(r.improveArea||[]).forEach(function(w){imps[w]=(imps[w]||0)+1})});
  var sortedImp=Object.entries(imps).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  if(sortedImp.length>0){h+='<div class="sec-title" style="margin-top:12px">🎯 家长最希望提升</div>';sortedImp.forEach(function(kv,i){h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid #F0F0F0"><div class="num" style="width:22px;height:22px;font-size:10px;background:linear-gradient(135deg,var(--gold),var(--warm))">'+(i+1)+'</div>'+kv[0]+'<span style="margin-left:auto;font-weight:bold;color:var(--gold)">'+kv[1]+'人</span></div>'})}

  // Recent
  h+='<div class="sec-title" style="margin-top:12px">📋 最近反馈</div>';
  var recent=records.slice(-5).reverse();
  if(recent.length===0)h+='<p style="color:var(--sub);font-size:12px;text-align:center;padding:16px">暂无反馈</p>';
  else recent.forEach(function(r){h+='<div style="background:linear-gradient(90deg,#EEF2F8,#F5F7FB);border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:12px;line-height:1.6"><b style="color:var(--deep)">'+(r.childName||'未填')+'</b> · '+(r.childGrade||'')+' · '+(r.time||'').slice(0,16)+'<br>整体：'+(r.overall||'未填')+' | 沟通：'+(r.communicate||'未填')+'<br>'+(r.toTeacher?'💬 "'+r.toTeacher+'"':'')+'</div>'});

  h+='<button class="btn" onclick="exportParentCSV()" style="margin-top:12px;background:linear-gradient(135deg,var(--navy),var(--blue))">📋 导出CSV</button>';
  g('dashContent').innerHTML=h;
}

function exportParentCSV(){
  var records=JSON.parse(localStorage.geek_parent||'[]'),csv='时间,孩子,年级,感受,喜欢什么,难度,喜欢老师,作业习惯,希望提升,沟通满意度,担心,暑假计划,推荐意愿,心里话,整体感受\n';
  records.forEach(function(r){csv+=[r.time.slice(0,16),r.childName,r.childGrade,r.feeling,(r.likeMost||[]).join('/'),r.difficulty,r.teacherLike,r.hwHabit,(r.improveArea||[]).join('/'),r.communicate,(r.worry||[]).join('/'),r.summerPlan,r.refer,r.toTeacher,r.overall].join(',')+'\n'});
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([''+csv],{type:'text/csv'}));a.download='家长反馈汇总.csv';a.click();
}

</script>
</body>
</html>
