<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>极客客户需求调研-顺德区域</title>
<style>
:root{--navy:#001FC5;--blue:#1F51D6;--mid:#2E75B6;--cyan:#00AAE7;--light:#5BA0D9;--deep:#1F3864;--gold:#FFC000;--orange:#ED7D31}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"微软雅黑","PingFang SC",sans-serif;background:linear-gradient(170deg,#0F1F44 0%,var(--deep) 30%,var(--navy) 60%,var(--blue) 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{max-width:420px;width:100%;text-align:center;color:#fff;position:relative}
.card::before{content:'';position:absolute;left:50%;top:20px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(31,81,214,.25),transparent 70%);transform:translateX(-50%);pointer-events:none}
.xg{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--gold),var(--orange));display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#fff;margin-bottom:16px;position:relative;z-index:1;box-shadow:0 8px 32px rgba(255,192,0,.3)}
.xg::after{content:'';position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:#4FFF4F;border:2.5px solid #fff}
h1{font-size:24px;font-weight:bold;letter-spacing:2px;position:relative;z-index:1;margin-bottom:6px}
.sub{font-size:13px;opacity:.55;position:relative;z-index:1;margin-bottom:20px}
.tags{display:flex;gap:8px;justify-content:center;position:relative;z-index:1;margin-bottom:28px}
.tags span{background:rgba(255,255,255,.1);padding:5px 12px;border-radius:14px;font-size:11px}
.btns{display:flex;gap:12px;position:relative;z-index:1;flex-direction:column}
.btn{width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;border:none;transition:.15s;text-align:center;text-decoration:none;display:block}
.btn-teacher{background:linear-gradient(135deg,var(--gold),var(--orange));color:#fff;box-shadow:0 4px 20px rgba(255,192,0,.3)}
.btn-manager{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.2);margin-top:8px}
.btn-manager-sub{background:transparent;color:rgba(255,255,255,.5);border:none;font-size:11px;cursor:pointer;margin-top:4px;font-family:inherit;text-align:center}
.desc{font-size:12px;opacity:.5;margin-top:6px}
.login-pop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:99;justify-content:center;align-items:center}
.login-pop.on{display:flex}
.login-box{background:#fff;border-radius:16px;padding:30px;text-align:center;width:300px}
.login-box h3{color:var(--deep);margin-bottom:4px}
.login-box p{font-size:12px;color:#999;margin-bottom:14px}
.login-box input{width:100%;padding:12px;border:2px solid #E0E4EC;border-radius:12px;font-size:14px;text-align:center;font-family:inherit;margin-bottom:8px}
.login-box input:focus{outline:none;border-color:var(--blue)}
.login-box .err{color:#C0392B;font-size:11px;display:none}
.login-box button{width:100%;padding:12px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-size:14px;margin-top:6px}
.login-box .cancel{background:#f0f0f0;color:#666;margin-top:4px}
.footer{position:relative;z-index:1;margin-top:20px;font-size:10px;opacity:.3}
</style></head><body>

<div class="card">
  <div class="xg">G</div>
  <h1>极客客户需求调研</h1>
  <div class="sub">顺德区域 · 学科需求洞察系统</div>
  <div class="tags"><span>🧪体验课</span><span>📝答疑课</span><span>🎯冲刺课</span></div>
  <div class="btns">
    <a href="https://f.wps.cn/g/lrpauvrG/" class="btn btn-teacher">👩‍🏫 教师入口 · 填写需求</a>
    <a href="#" class="btn btn-manager" onclick="showLogin();return false">📊 干部入口 · 查看看板</a>
    <button class="btn-manager-sub" onclick="showLogin();return false">需要密码认证</button>
  </div>
  <div class="footer">极客素养中心 · 华南事业部 · 顺德校区</div>
</div>

<div class="login-pop" id="loginPop">
  <div class="login-box">
    <h3>🔐 干部登录</h3>
    <p>输入管理密码查看数据看板</p>
    <input type="password" id="pwd" placeholder="请输入密码" autocomplete="off">
    <div class="err" id="err">密码错误</div>
    <button onclick="checkLogin()">验证进入</button>
    <button class="cancel" onclick="hideLogin()">取消</button>
  </div>
</div>

<script>
function showLogin(){document.getElementById('loginPop').classList.add('on');document.getElementById('pwd').focus()}
function hideLogin(){document.getElementById('loginPop').classList.remove('on')}
document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')checkLogin()})
function checkLogin(){
  if(document.getElementById('pwd').value==='jike2026'){
    window.location.href='https://b16673372-cmd.github.io/---/dashboard.html'
  }else{document.getElementById('err').style.display='block';document.getElementById('pwd').value=''}
}
</script>
</body></html>
